name: Build TDLib

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    name: Linux (${{ matrix.arch }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, arm64]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout TDLib
        uses: actions/checkout@v4
        with:
          repository: tdlib/td
          fetch-depth: 1
          path: td

      - name: Setup Go
        if: matrix.arch == 'x86_64'
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Get TDLib Version
        id: vars
        run: |
          cd td
          COMMIT_HASH=$(git log -1 --pretty=%H)
          VERSION=$(grep -oE 'project\(TDLib VERSION [0-9.]+' CMakeLists.txt | awk '{print $3}')
          echo "commit=$COMMIT_HASH" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "TDLib Version: $VERSION ($COMMIT_HASH)"

      - name: Generate tdlib.json
        if: matrix.arch == 'x86_64'
        run: |
          go run ./scripts/generate/ -src td/td/generate/scheme/td_api.tl -version "${{ steps.vars.outputs.version }}" -commit "${{ steps.vars.outputs.commit }}" -out tdlib.json

      - name: Commit tdlib.json
        if: matrix.arch == 'x86_64'
        run: |
          git config --global user.name "AshokShau"
          git config --global user.email "AshokShau@users.noreply.github.com"
          git add tdlib.json
          git commit -m "Update tdlib.json to version ${{ steps.vars.outputs.version }}" || echo "No changes to commit"
          git push origin HEAD:${{ github.ref }} || echo "Push failed"

      - name: Install Host Build Tools (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gperf

      - name: Install Native Dependencies (Linux Host)
        run: |
          sudo apt-get install -y zlib1g-dev libssl-dev

      - name: Run Native Prepare for Cross-Compilation (Linux arm64)
        if: matrix.arch == 'arm64'
        run: |
          cmake -S td -B build-native -DCMAKE_BUILD_TYPE=Release
          cmake --build build-native --target prepare_cross_compiling

      - name: Install Cross-compilation Toolchain (Linux arm64)
        if: matrix.arch == 'arm64'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Build Zlib from source (Linux arm64)
        if: matrix.arch == 'arm64'
        run: |
          git clone --depth 1 https://github.com/madler/zlib.git zlib-src
          cd zlib-src
          CHOST=aarch64-linux-gnu CC=aarch64-linux-gnu-gcc ./configure --prefix=/tmp/zlib-arm64
          make -j$(nproc)
          make install

      - name: Build OpenSSL from source (Linux arm64)
        if: matrix.arch == 'arm64'
        run: |
          git clone --depth 1 -b openssl-3.0 https://github.com/openssl/openssl.git openssl-src
          cd openssl-src
          ./Configure linux-aarch64 --cross-compile-prefix=aarch64-linux-gnu- --prefix=/tmp/openssl-arm64
          make -j$(nproc)
          make install_sw

      - name: Configure CMake (Linux x86_64)
        if: matrix.arch == 'x86_64'
        run: |
          cmake -S td -B build -DCMAKE_BUILD_TYPE=Release

      - name: Configure CMake (Linux arm64)
        if: matrix.arch == 'arm64'
        run: |
          cmake -S td -B build \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
            -DZLIB_ROOT=/tmp/zlib-arm64 \
            -DOPENSSL_ROOT_DIR=/tmp/openssl-arm64 \
            -DTD_PREPARE_CROSS_COMPILING_DIR=${{ github.workspace }}/build-native \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build TDLib (Linux)
        run: |
          cmake --build build --target tdjson tdjson_static -j$(nproc)

      - name: Prepare Artifact
        run: |
          mkdir -p out-shared out-static
          find build -type f -name "libtdjson.so*" -exec cp -P {} out-shared/ \;
          find build -type f -name "libtdjson_static.a" -exec cp -P {} out-static/ \;
          
          cd out-shared
          tar -czf ../TDLib-tdjson-linux-${{ matrix.arch }}-shared.tar.gz *
          cd ../out-static
          tar -czf ../TDLib-tdjson-linux-${{ matrix.arch }}-static.tar.gz *

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.vars.outputs.version }}
          name: TDLib v${{ steps.vars.outputs.version }}
          body: |
            TDLib Version: ${{ steps.vars.outputs.version }}
            Commit: ${{ steps.vars.outputs.commit }}
          files: |
            TDLib-tdjson-linux-${{ matrix.arch }}-shared.tar.gz
            TDLib-tdjson-linux-${{ matrix.arch }}-static.tar.gz

  build-macos:
    name: macOS (${{ matrix.arch }})
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x86_64]
    steps:
      - name: Checkout TDLib
        uses: actions/checkout@v4
        with:
          repository: tdlib/td
          fetch-depth: 1
          path: td

      - name: Get TDLib Version
        id: vars
        run: |
          cd td
          VERSION=$(grep -oE 'project\(TDLib VERSION [0-9.]+' CMakeLists.txt | awk '{print $3}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Install Common Dependencies (macOS)
        run: |
          brew install gperf cmake openssl

      - name: Run Native Prepare for Cross-Compilation (macOS x86_64)
        if: matrix.arch == 'x86_64'
        run: |
          cmake -S td -B build-native -DCMAKE_BUILD_TYPE=Release -DOPENSSL_ROOT_DIR=$(brew --prefix openssl)
          cmake --build build-native --target prepare_cross_compiling

      - name: Build OpenSSL from source (macOS x86_64)
        if: matrix.arch == 'x86_64'
        run: |
          git clone --depth 1 -b openssl-3.0 https://github.com/openssl/openssl.git openssl-src
          cd openssl-src
          ./Configure darwin64-x86_64-cc --prefix=/tmp/openssl-x86_64
          make -j$(sysctl -n hw.logicalcpu)
          make install_sw

      - name: Configure CMake (macOS arm64)
        if: matrix.arch == 'arm64'
        run: |
          cmake -S td -B build -DCMAKE_BUILD_TYPE=Release -DOPENSSL_ROOT_DIR=$(brew --prefix openssl)

      - name: Configure CMake (macOS x86_64)
        if: matrix.arch == 'x86_64'
        run: |
          cmake -S td -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=x86_64 \
            -DOPENSSL_ROOT_DIR=/tmp/openssl-x86_64 \
            -DTD_PREPARE_CROSS_COMPILING_DIR=${{ github.workspace }}/build-native

      - name: Build TDLib (macOS)
        run: |
          cmake --build build --target tdjson tdjson_static -j$(sysctl -n hw.logicalcpu)

      - name: Prepare Artifact
        run: |
          mkdir -p out-shared out-static
          find build -type f \( -name "libtdjson.dylib" -o -name "libtdjson.*.dylib" \) -exec cp {} out-shared/ \; || true
          find build -type f -name "libtdjson_static.a" -exec cp {} out-static/ \; || true
          
          cd out-shared
          tar -czf ../TDLib-tdjson-macos-${{ matrix.arch }}-shared.tar.gz *
          cd ../out-static
          tar -czf ../TDLib-tdjson-macos-${{ matrix.arch }}-static.tar.gz *

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.vars.outputs.version }}
          files: |
            TDLib-tdjson-macos-${{ matrix.arch }}-shared.tar.gz
            TDLib-tdjson-macos-${{ matrix.arch }}-static.tar.gz

  build-windows:
    name: Windows (${{ matrix.arch }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
    steps:
      - name: Checkout TDLib
        uses: actions/checkout@v4
        with:
          repository: tdlib/td
          fetch-depth: 1
          path: td

      - name: Get TDLib Version
        id: vars
        shell: bash
        run: |
          cd td
          VERSION=$(grep -oE 'project\(TDLib VERSION [0-9.]+' CMakeLists.txt | awk '{print $3}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Install gperf (Chocolatey)
        shell: powershell
        run: |
          choco install gperf

      - name: Install Dependencies (vcpkg)
        shell: powershell
        run: |
          if ("${{ matrix.arch }}" -eq "x64") {
             vcpkg install openssl:x64-windows zlib:x64-windows
          } else {
             vcpkg install openssl:arm64-windows zlib:arm64-windows
          }

      - name: Configure CMake
        shell: powershell
        run: |
          if (Test-Path build) { Remove-Item build -Force -Recurse -ErrorAction SilentlyContinue }
          if (Test-Path build-native) { Remove-Item build-native -Force -Recurse -ErrorAction SilentlyContinue }
          
          $vcpkgRoot = $env:VCPKG_INSTALLATION_ROOT
          $gperfPath = (Get-Command gperf).Source
          
          if ("${{ matrix.arch }}" -eq "arm64") {
             mkdir build-native
             cd build-native
             cmake -A x64 -DCMAKE_TOOLCHAIN_FILE="$vcpkgRoot\scripts\buildsystems\vcpkg.cmake" -DGPERF_EXECUTABLE="$gperfPath" -DVCPKG_APPLOCAL_DEPS=OFF ../td
             cmake --build . --target prepare_cross_compiling --config Release
             cd ..
          
             mkdir build
             cd build
             $nativeDir = Resolve-Path "..\build-native"
             cmake -A ARM64 -DCMAKE_SYSTEM_NAME=Windows -DCMAKE_SYSTEM_PROCESSOR=ARM64 -DCMAKE_CROSSCOMPILING=ON -DCMAKE_INSTALL_PREFIX:PATH=../td/tdlib -DCMAKE_TOOLCHAIN_FILE="$vcpkgRoot\scripts\buildsystems\vcpkg.cmake" -DGPERF_EXECUTABLE="$gperfPath" -DTD_PREPARE_CROSS_COMPILING_DIR="$nativeDir" -DVCPKG_APPLOCAL_DEPS=OFF ../td
          } else {
             mkdir build
             cd build
             cmake -A x64 -DCMAKE_INSTALL_PREFIX:PATH=../td/tdlib -DCMAKE_TOOLCHAIN_FILE="$vcpkgRoot\scripts\buildsystems\vcpkg.cmake" -DGPERF_EXECUTABLE="$gperfPath" -DVCPKG_APPLOCAL_DEPS=OFF ../td
          }

      - name: Build TDLib (Windows)
        shell: powershell
        run: |
          cd build
          cmake --build . --target install --config Release

      - name: Prepare Artifact
        shell: powershell
        run: |
          mkdir out-shared
          mkdir out-static
          if (Test-Path "td/tdlib/bin") {
             Copy-Item "td/tdlib/bin/*.dll" -Destination "out-shared"
          }
          if (Test-Path "td/tdlib/lib") {
             Copy-Item "td/tdlib/lib/tdjson.lib" -Destination "out-shared" -ErrorAction SilentlyContinue
             Copy-Item "td/tdlib/lib/tdjson_static.lib" -Destination "out-static" -ErrorAction SilentlyContinue
          }
          
          cd out-shared
          Compress-Archive -Path * -DestinationPath ../TDLib-tdjson-windows-${{ matrix.arch }}-shared.zip
          cd ../out-static
          Compress-Archive -Path * -DestinationPath ../TDLib-tdjson-windows-${{ matrix.arch }}-static.zip

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.vars.outputs.version }}
          files: |
            TDLib-tdjson-windows-${{ matrix.arch }}-shared.zip
            TDLib-tdjson-windows-${{ matrix.arch }}-static.zip

  build-android:
    name: Android (${{ matrix.abi }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        abi: [aarch64, x86_64]
    steps:
      - name: Checkout TDLib
        uses: actions/checkout@v4
        with:
          repository: tdlib/td
          fetch-depth: 1
          path: td

      - name: Get TDLib Version
        id: vars
        run: |
          cd td
          VERSION=$(grep -oE 'project\(TDLib VERSION [0-9.]+' CMakeLists.txt | awk '{print $3}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Android NDK
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "ndk;27.3.13750724"
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/27.3.13750724" >> $GITHUB_ENV
          echo "ANDROID_API=29" >> $GITHUB_ENV
          echo "NDK_TOOLCHAIN=$ANDROID_SDK_ROOT/ndk/27.3.13750724/toolchains/llvm/prebuilt/linux-x86_64" >> $GITHUB_ENV
          if [ "${{ matrix.abi }}" = "aarch64" ]; then
            echo "OPENSSL_TARGET=android-arm64" >> $GITHUB_ENV
            echo "ANDROID_ABI=arm64-v8a" >> $GITHUB_ENV
          else
            echo "OPENSSL_TARGET=android-x86_64" >> $GITHUB_ENV
            echo "ANDROID_ABI=x86_64" >> $GITHUB_ENV
          fi

      - name: Install Host Dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gperf zlib1g-dev libssl-dev ninja-build

      - name: Run Native Prepare for Cross-Compilation
        run: |
          cmake -G Ninja -S td -B build-native -DCMAKE_BUILD_TYPE=Release
          cmake --build build-native --target prepare_cross_compiling

      - name: Build static openssl for Android
        run: |
          wget -q https://www.openssl.org/source/openssl-3.0.15.tar.gz
          tar -xzf openssl-3.0.15.tar.gz
          cd openssl-3.0.15
          export PATH=$NDK_TOOLCHAIN/bin:$PATH
          ./Configure $OPENSSL_TARGET no-shared no-tests --prefix=$(pwd)/openssl-install
          make -j$(nproc)
          make install_sw
          echo "OPENSSL_ROOT_DIR=$(pwd)/openssl-install" >> $GITHUB_ENV

      - name: Build TDLib (Android)
        run: |
          cmake -G Ninja -S td -B build \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_ROOT/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=$ANDROID_ABI \
            -DANDROID_PLATFORM=android-$ANDROID_API \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX:PATH=../tdlib \
            -DOPENSSL_ROOT_DIR=$OPENSSL_ROOT_DIR \
            -DOPENSSL_INCLUDE_DIR=$OPENSSL_ROOT_DIR/include \
            -DOPENSSL_CRYPTO_LIBRARY=$OPENSSL_ROOT_DIR/lib/libcrypto.a \
            -DOPENSSL_SSL_LIBRARY=$OPENSSL_ROOT_DIR/lib/libssl.a \
            -DTD_PREPARE_CROSS_COMPILING_DIR=${{ github.workspace }}/build-native \
            -DTD_ENABLE_JNI=ON
          cmake --build build --target install/strip --parallel

      - name: Prepare Artifact
        run: |
          mkdir -p out-shared out-static
          find tdlib -type f -name "*.so*" -exec cp -P {} out-shared/ \;
          find tdlib -type f -name "*.a*" -exec cp -P {} out-static/ \;
          
          cd out-shared
          tar -czf ../TDLib-tdjson-android-${{ matrix.abi }}-shared.tar.gz *
          cd ../out-static
          tar -czf ../TDLib-tdjson-android-${{ matrix.abi }}-static.tar.gz *

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.vars.outputs.version }}
          files: |
            TDLib-tdjson-android-${{ matrix.abi }}-shared.tar.gz
            TDLib-tdjson-android-${{ matrix.abi }}-static.tar.gz
